    })();
    return()=>{cancelled=true};
  },[scores,liveSync?.last,currentUser.username]);
  const lb=isProductionMode()?productionLb:demoLb;
  const openUserProfile=useCallback(username=>{
    const key=normalizeUserLookupKey(username);
    if(!key) return;
    setSelectedUserKey(key);
    setSelectedPublicUser(null);
  },[]);
  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      try{
        const rows=await predictionRevealAdapter.loadVisible();
        if(!cancelled) setVisiblePredictions(rows||[]);
      }catch(err){
        if(!cancelled&&isProductionMode()) console.warn('Supabase visible predictions load failed:',safeSupabaseError(err));
      }
    })();
    return()=>{cancelled=true};
  },[currentUser.username,lockedMatchIdsKey]);

  const matchdayRows=useMemo(()=>{
    const activeDay=[...live,...today.filter(m=>m.status!=='live')];
    if(activeDay.length>0){
      const uniq=Object.values(activeDay.reduce((acc,m)=>{acc[m.id]=m;return acc;},{}));
      return uniq.sort((a,b)=>new Date(a.utc)-new Date(b.utc));
    }
    if(nextM){
      const nextKey=fmtDateKey(nextM.utc);
      return enriched.filter(m=>fmtDateKey(m.utc)===nextKey).sort((a,b)=>new Date(a.utc)-new Date(b.utc));
    }
    return [];
  },[live,today,nextM,enriched]);
  const currentMatchdayKey=matchdayRows[0]?fmtDateKey(matchdayRows[0].utc):null;
  const rankingDayKey=matchdayRows[0]?fmtDateKey(matchdayRows[0].utc):null;
  const topDailyRanking=useMemo(()=>{
    if(!rankingDayKey) return [];
    const dayMatches=MATCHES.filter(m=>fmtDateKey(m.utc)===rankingDayKey);
    const rankingUsers=isProductionMode()?lb:Object.values(users);
    const productionPredictionsByUser=isProductionMode()?visiblePredictions.reduce((acc,p)=>{
      if(!p?.username||p.matchId==null) return acc;
      const key=normalizeUserLookupKey(p.username);
      acc[key]=acc[key]||{};
      acc[key][String(p.matchId)]={h:p.h,a:p.a,savedAt:p.savedAt};
      return acc;
    },{}):null;
    const rows=rankingUsers.map(u=>{
      const preds=isProductionMode()
        ?productionPredictionsByUser[normalizeUserLookupKey(u.username)]||{}
        :predictionsAdapter.getForUser(u.username);
      let dayPts=0,exact=0,correct=0,played=0;
      dayMatches.forEach(m=>{
        const pred=preds[m.id];
        const sc=scores[m.id];
        if(!pred||!isFinalScoreForUserProfile(sc)) return;
        played++;
        const p=ruleMatchPoints(m,pred,sc);
        dayPts+=p;
        if(pred.h===sc.h&&pred.a===sc.a) exact++;
        if(outcome(pred.h,pred.a)===outcome(sc.h,sc.a)) correct++;
      });
      const form=played?Math.round((correct/played)*100):0;
      return{...u,dayPts,exact,correct,played,form};
    });
    return rows.sort((a,b)=>(b.dayPts-a.dayPts||b.exact-a.exact||b.correct-a.correct||a.displayName.localeCompare(b.displayName,'tr'))).slice(0,3);
  },[rankingDayKey,users,scores,lb,visiblePredictions]);

  useEffect(()=>{
    if(selectedMatchId==null) return;
    if(!matchdayRows.some(m=>m.id===selectedMatchId)) setSelectedMatchId(null);
  },[matchdayRows,selectedMatchId]);

  useEffect(()=>{
    if(currentMatchdayKey!==selectedMatchdayKey){
      setSelectedMatchdayKey(currentMatchdayKey);
      setSelectedMatchId(null);
    }
  },[currentMatchdayKey,selectedMatchdayKey]);

  const selectedMatch=useMemo(()=>{
    if(selectedMatchId==null) return null;
    return enriched.find(m=>m.id===selectedMatchId)||null;
  },[selectedMatchId,enriched]);

  useEffect(()=>{
    if(!selectedUserKey||!isProductionMode()){
      setSelectedPublicUser(null);
      return;
    }
    let cancelled=false;
    (async()=>{
      try{
        const publicUser=await loadSupabasePublicUserProfile(selectedUserKey,{scores,rankingDayKey,leaderboardRows:lb});
        if(!cancelled) setSelectedPublicUser(publicUser);
      }catch(err){
        if(!cancelled){
          console.warn('Supabase public profile load failed:',safeSupabaseError(err));
          setSelectedPublicUser(null);
        }
      }
    })();
    return()=>{cancelled=true};
  },[selectedUserKey,scores,rankingDayKey,lb]);

  const revealedPredFeed=useMemo(()=>{
    const selectedLockedMatchId=selectedMatch&&(selectedMatch.ls==='locked'||selectedMatch.ls==='started')?selectedMatch.id:null;
    const unique=new Map();
    visiblePredictions.forEach(p=>{
      if(!p||typeof p.h!=='number'||typeof p.a!=='number') return;
      const m=MATCHES.find(x=>String(x.id)===String(p.matchId));
      if(!m) return;
      const lockState=getLockState(m,now);
      if(lockState!=='locked'&&lockState!=='started') return;
      if(selectedLockedMatchId!=null&&m.id!==selectedLockedMatchId) return;
      const savedAtRaw=p.savedAt?new Date(p.savedAt).getTime():0;
      const savedAtMs=Number.isFinite(savedAtRaw)?savedAtRaw:0;
      unique.set(`${p.userId}_${m.id}`,{
        key:`${p.userId}_${m.id}`,
        username:p.username,
        displayName:p.displayName,
        home:m.h,
        away:m.a,
        h:p.h,
        a:p.a,
        savedAtMs,
        matchUtcMs:new Date(m.utc).getTime()
      });
    });
    return [...unique.values()].sort((a,b)=>(b.savedAtMs-a.savedAtMs||b.matchUtcMs-a.matchUtcMs||a.displayName.localeCompare(b.displayName,'tr')));
  },[visiblePredictions,selectedMatch,now]);

  const selectedUser=useMemo(()=>{
    if(!selectedUserKey) return null;
    const picksPublic=isTournamentPickPublic(now);
    const lbRow=lb.find(x=>x.username===selectedUserKey)||{};
    const dayRow=topDailyRanking.find(x=>x.username===selectedUserKey)||{};
    const base=users[selectedUserKey]||selectedPublicUser||lbRow;
    if(!base||!base.username) return null;
    const avg=selectedPublicUser?.avg??lbRow.avg??base.avg??0;
    return{
      ...base,
      ...selectedPublicUser,
      username:selectedPublicUser?.username||lbRow.username||base.username,
      displayName:selectedPublicUser?.displayName||lbRow.displayName||base.displayName,
      avatarId:selectedPublicUser?.avatarId??base.avatarId??lbRow.avatarId??'',
      totalPoints:lbRow.totalPoints??selectedPublicUser?.totalPoints??base.totalPoints??0,
      st:lbRow.st??selectedPublicUser?.st??base.st??0,
      tt:lbRow.tt??selectedPublicUser?.tt??base.tt??0,
      avg,
      cp:selectedPublicUser?.cp??formatProfileAverage(avg),
      dayPts:selectedPublicUser?.dayPts??dayRow.dayPts??base.dayPts??0,
      userScore:selectedPublicUser?.userScore??base.userScore??lbRow.userScore??0,
      championPick:selectedPublicUser?.championPick??(picksPublic?championAdapter.getForUser(base.username):null),
      goldenBootPick:selectedPublicUser?.goldenBootPick??(picksPublic?goldenBootAdapter.getForUser(base.username):null)
    };
  },[selectedUserKey,selectedPublicUser,users,lb,topDailyRanking,now]);
  const selectedUserAvatar=useMemo(()=>{
    if(!selectedUser) return null;
    return avatarById(selectedUser.avatarId);
  },[selectedUser]);
  const selectedUserAvatarFallback=useMemo(()=>((selectedUser?.displayName||selectedUser?.username||'U').charAt(0).toUpperCase()),[selectedUser]);

  const comms=useMemo(()=>{
    const nowMs=now.getTime();
    const list=[];
    const push=(text,ts=nowMs)=>list.push({id:`news_${list.length}_${Math.max(0,Math.floor(ts))}`,text,ts:Number.isFinite(ts)?ts:nowMs});
    const userList=Object.values(users);

    userList
      .filter(u=>u.createdAt)
      .sort((a,b)=>new Date(b.createdAt).getTime()-new Date(a.createdAt).getTime())

    const finishedDesc=MATCHES
      .filter(m=>{
        const sc=scores[m.id];
        return sc&&typeof sc.h==='number'&&typeof sc.a==='number'&&sc.status!=='live';
      })
      .sort((a,b)=>new Date(b.utc).getTime()-new Date(a.utc).getTime());

    let exactAdded=false;
    for(const m of finishedDesc){
      const sc=scores[m.id];
      for(const u of userList){
        const p=predictionsAdapter.getForUser(u.username)[m.id];
        if(p&&p.h===sc.h&&p.a===sc.a){
          push(`${u.displayName} adlı kullanıcı başarılı skor tahmini yaptı.`,new Date(m.utc).getTime()+3);
          exactAdded=true;
          break;
        }
      }
      if(exactAdded) break;
    }

    let streakAdded=false;
    for(const u of userList){
      let streak=0;
      for(const m of finishedDesc){
        const sc=scores[m.id];
        const p=predictionsAdapter.getForUser(u.username)[m.id];
        if(!p) continue;
        if(p.h===sc.h&&p.a===sc.a){
          streak++;
          if(streak>=2){
            push(`${u.displayName} adlı kullanıcı üst üste ${streak} skor bildi.`,new Date(m.utc).getTime()+2);
            streakAdded=true;
            break;
          }
        }else{
          streak=0;
        }
      }
      if(streakAdded) break;

    if(lb[0]) push(`Lider değişti, yeni lider ${lb[0].displayName}.`,nowMs-120000);

    if(live[0]) push(`Canlı maçta son durum: ${live[0].h} - ${live[0].a}.`,nowMs+1500);

    let missedAdded=false;
    for(const m of finishedDesc){
      for(const u of userList){
        const p=predictionsAdapter.getForUser(u.username)[m.id];
        if(!p){
          push(`${u.displayName}, ${m.h} - ${m.a} maçı tahminini kaçırdı.`,new Date(m.utc).getTime()+1);
          missedAdded=true;
          break;
        }
      }
      if(missedAdded) break;
    }

    if(list.length===0) push('Turnuva haber akışı hazırlanıyor.',nowMs);

    const seen=new Set();
    return list
      .sort((a,b)=>b.ts-a.ts)
      .filter(item=>{
        if(seen.has(item.text)) return false;
        seen.add(item.text);
        return true;
      })
      .slice(0,12);
  },[users,scores,lb,nextM,live,now]);

  const systemInfos=useMemo(()=>[
    {tone:'gold',title:'Gün Verisi',txt:'Seçili gün için puanlanan tahmin verisi bekleniyor.'},
    {tone:'green',title:'Canlı Durum',txt:`Canlı maç sayısı: ${live.length}`},
    {tone:'red',title:'Kilit Uyarısı',txt:'Maçlardan 60 dakika önce tahminler otomatik kilitlenir.'}
  ],[live.length]);

  const seasonCompletion=Math.round((finished.length/MATCHES.length)*100)||0;

  return<div className="home-fm">
    <section className="context-banner">
      <div className="context-main">
        <div className="league-badge"><img src="./worldcup1.png" alt="FIFA World Cup 2026" /></div>
        <div>
          <div className="context-overline">INTERNATIONAL · TOURNAMENT</div>
          <h1>FIFA WORLD CUP 2026</h1>
          <div className="context-meta">
            <span>{Object.keys(users).length} oyuncu</span>
            <span>•</span>
            <span>{MATCHES.length} maç</span>
            <span>•</span>
            <span className="status-live"><span className="live-dot"/> {live.length>0?'ACTIVE':'READY'}</span>
          </div>
        </div>
      </div>
      <div className="context-next">
        <div className="context-next-label">NEXT UP</div>
        {nextM?<div className="context-next-match">{nextM.h} vs {nextM.a}</div>:<div className="context-next-match">Takvim bekleniyor</div>}
        <div className="context-next-time">{cdVal?`Başlangıca ${cdVal}`:'Canlı maçlar devam ediyor'}</div>
      </div>
    </section>

    {liveSync?.last&&<div className="sync-note">Live skor senkronu: {new Date(liveSync.last).toLocaleString('tr-TR')}</div>}

    <section className="fm-grid fm-grid-dashboard" data-layout="home-3col">
      <div className="fm-panel">
        <div className="panel-head">GENEL PUAN DURUMU</div>
        <div className="standings-table standings-full">
          <div className="standings-head">
            <span>#</span>
            <span>KULLANICI</span>
            <span className="h-p">PUAN</span>
            <span className="h-st">SKOR</span>
            <span className="h-tt">TARAF</span>
            <span className="h-cp">AVERAJ(+)</span>
          </div>
          {lb.map((u,i)=><div key={u.username} className="standings-row">
            <span>{i+1}</span>
            <button type="button" className="user-link-btn truncate" onClick={()=>openUserProfile(u.username)}>{u.displayName}</button>
            <span className="mono val-p">{u.totalPoints||0}</span>
            <span className="mono val-st">{u.st||0}</span>
            <span className="mono val-tt">{u.tt||0}</span>
            <span className="mono val-cp">{u.potentialPts||0}</span>
          </div>)}
          {lb.length===0&&<div className="recap-empty">Henüz oyuncu verisi yok.</div>}
        </div>

        <div className="panel-head mt16">Turnuva Haberleri <span className="panel-tag">{comms.length} NEW</span></div>
        <div className="news-marquee">
          <div className={`news-track${comms.length<2?' static':''}`}>
            {[...comms,...(comms.length>1?comms:[])].map((item,i)=><div key={`${item.id}_${i}`} className="news-item">
              <span className="dot">•</span>
              <span>{item.text}</span>
            </div>)}
          </div>
        </div>
      </div>

      <div className="fm-panel">
        <div className="panel-head">Günün Maçları</div>
        <div className="recap-table" style={{marginTop:10}}>
          <div className="recap-head"><span>STATUS</span><span>HOME</span><span>SCORE</span><span>AWAY</span><span>DETAY</span></div>
          {matchdayRows.length===0&&<div className="recap-empty">Bu sekmede gösterilecek maç yok.</div>}
          {matchdayRows.map(m=>{
            const sc=scores[m.id]||null;
            const stLabel=m.status==='live'?'LIVE':m.status==='finished'?'FULL TIME':'-';
            const stClass=m.status==='live'?'live':m.status==='finished'?'full':'idle';
            const isActive=selectedMatchId===m.id;
            return<div key={m.id} className={`recap-row clickable${isActive?' active':''}`} onClick={()=>setSelectedMatchId(m.id)}>
              <span className={`st-chip ${stClass}`}>{stLabel}</span>
              <span>{m.h}</span>
              <span className="mono">{sc?`${sc.h}-${sc.a}`:'-'}</span>
              <span>{m.a}</span>
              <span className="mono">{isActive?'AÇIK':'İNCELE'}</span>
            </div>;
          })}
        </div>
      </div>

      <div className="fm-panel right-col" data-col="right">
        <div className="panel-head">TOP RANKING · GÜNÜN EN İYİ 3</div>
        <div className="standings-table">
          <div className="standings-head"><span>RK</span><span>KULLANICI</span><span>P</span><span>FORM</span></div>
          {topDailyRanking.map((u,i)=><div key={u.username} className="standings-row">
            <span>{i+1}</span>
            <button type="button" className="user-link-btn truncate" onClick={()=>openUserProfile(u.username)}>{u.displayName}</button>
            <span className="mono">{u.dayPts||0}</span>
            {u.played>0
              ?<span className="form-dots">
                <i className={u.form>=60?'ok':'bad'}/>
                <i className={u.form>=40?'ok':'bad'}/>
                <i className={u.form>=20?'ok':'bad'}/>
              </span>
              :<span className="mono" style={{color:'var(--tm)'}}>-</span>}
          </div>)}
          {topDailyRanking.length===0&&<div className="recap-empty">Bugün için performans verisi oluşmadı.</div>}
        </div>

        <div className="panel-head mt16">SİSTEM BİLGİSİ</div>
        <div className="insights-list">
          {systemInfos.map((x,i)=><div key={i} className={`insight-item ${x.tone}`}>
            <div>{x.username?<button type="button" className="insight-user-btn" onClick={()=>openUserProfile(x.username)}>{x.title}</button>:x.title}</div>
            <small>{x.txt}</small>
          </div>)}
        </div>

        <div className="panel-head mt16">SIMULATION PROGRESS</div>
        <div className="sim-progress">
          <div className="sim-row"><span>SEASON COMPLETION</span><strong>{seasonCompletion}%</strong></div>
          <div className="fm-bar"><i style={{width:`${seasonCompletion}%`}}/></div>
          <div className="sim-row"><span>WEEK DATA LOADED</span><strong>100%</strong></div>
          <div className="fm-bar green"><i style={{width:'100%'}}/></div>
        </div>
      </div>
    </section>

    <section className="fm-detail-zone">
      <div className="fm-panel">
        <div className="panel-head">Maç Detay Kartı</div>
        {!selectedMatch&&<div className="recap-empty">Günün Maçları bölümünden bir maç seçin.</div>}
        {selectedMatch&&<div className="match-intel-card pred-card state-locked" style={{marginTop:10}}>
          <div className="pred-status-bar psb-locked">
            <span className="psb-txt">SKOR TAHMİNİ KAPALI · BİLGİ KARTI</span>
            <span style={{fontSize:10,opacity:.75}}>{fmtDateFull(selectedMatch.utc)} · {fmtTR(selectedMatch.utc)} TR</span>
          </div>
          <div className="pred-body">
            <div style={{marginBottom:12}}>
              <MatchScoreboard m={selectedMatch} now={now} score={scores[selectedMatch.id]||null} status={selectedMatch.status}/>
            </div>
            <div className="intel-note">Ana sayfada skor tahmini yapılamaz. Bu kart yalnızca maç bilgisi ve canlı durum detaylarını gösterir.</div>
          </div>
        </div>}
      </div>
      <div className="fm-panel" style={{marginTop:10}}>
        <div className="pred-feed-wrap">
          <div className="panel-head">Kullanıcı Tahminleri</div>
          <div className="pred-feed-list">
            {revealedPredFeed.map(u=><div key={u.key} className="pred-feed-row">
              <span className="pred-feed-line">
                {u.home} <span className="pred-feed-score-inline">{u.h} - {u.a}</span> {u.away} <button type="button" className="pred-feed-user-tag" onClick={()=>openUserProfile(u.username)}>({(u.displayName||u.username||'').toUpperCase()})</button>
              </span>
            </div>)}
            {revealedPredFeed.length===0&&<div className="recap-empty">Kilit sonrası görülebilir skor tahmini henüz yok.</div>}
          </div>
        </div>
      </div>
    </section>
    {selectedUser&&<div className="user-modal-overlay" onClick={()=>setSelectedUserKey(null)}>
      <div className="user-modal" role="dialog" aria-modal="true" aria-label="Kullanıcı detayları" onClick={e=>e.stopPropagation()}>
        <div className="user-modal-head">
          <h4>Kullanıcı Detayı</h4>
          <button type="button" className="user-modal-close" onClick={()=>setSelectedUserKey(null)}>KAPAT</button>
        </div>
        <div className="user-modal-body">
          <div className="user-ident">
            <div className="user-ident-main">
              <div className="user-ident-avatar">
                {selectedUserAvatar
                  ?<img src={selectedUserAvatar.src} alt={`${selectedUser.displayName} avatar`}/>
                  :<span>{selectedUserAvatarFallback}</span>}
              </div>
              <div className="user-ident-meta">
                <strong>{selectedUser.displayName}</strong>
                <small>@{selectedUser.username}</small>
              </div>
            </div>
            <div className="user-score-pill">
              <span>PROFİL SKORU</span>
              <strong>{selectedUser.userScore||0}</strong>
            </div>
          </div>
          <div className="user-modal-grid">
            <div className="cell puan"><span>PUAN</span><strong>{selectedUser.totalPoints||0}</strong></div>
            <div className="cell skor"><span>SKOR</span><strong>{selectedUser.st||0}</strong></div>
            <div className="cell taraf"><span>TARAF</span><strong>{selectedUser.tt||0}</strong></div>
            <div className="cell averaj"><span>AVERAJ(+)</span><strong>{selectedUser.cp||0}</strong></div>
            <div className="cell puan"><span>GÜN PUAN</span><strong>{selectedUser.dayPts||0}</strong></div>
          </div>
          {isTournamentPickPublic(now)&&<div className="user-modal-picks">
            <div className="cell"><span>ŞAMPİYON TAHMİNİ</span><strong>{selectedUser.championPick||'-'}</strong></div>
            <div className="cell"><span>GOL KRALI TAHMİNİ</span><strong>{selectedUser.goldenBootPick||'-'}</strong></div>
          </div>}
        </div>
      </div>
    </div>}
  </div>;
}
/*  Ana Sayfa Match Card  */
function MC({m,now,scores,myPreds,showCD=false,compact=false}){
  const sc=scores[m.id]||null;
  const myP=myPreds[m.id]||null;
  const isLocked=getLockState(m,now)==='locked'||getLockState(m,now)==='started';
  const cd=showCD&&m.status==='upcoming'?cdText(m.utc,now):null;
  const hS=SEEDED.includes(m.h);const aS=SEEDED.includes(m.a);
  const statusEl=()=>{
    if(m.status==='live')return<span className="tag tag-live"> CANLI</span>;
    if(m.status==='finished')return<span className="tag tag-done">BİTTİ</span>;
    if(isLocked)return<span className="tag tag-lock"></span>;
    if(cd&&parseInt(cd)<=90)return<span className="tag tag-soon">YAKINDA</span>;
    return null;
  };
  return<div className={`match-card${m.status==='live'?' live':m.status==='finished'?' finished':''}`}>
    <div className="mc-body" style={{padding:'10px'}}>
      <MatchScoreboard m={m} now={now} score={sc} status={m.status}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:8}}>
        <div>{statusEl()}</div>
        {(hS||aS)&&<div style={{fontSize:9,color:'var(--or)',letterSpacing:'.06em'}}>SERİ BAŞI: {hS?m.h:''}{hS&&aS?' / ':''}{aS?m.a:''}</div>}
      </div>
      {/* Locked: show my prediction */}
      {isLocked&&myP&&<div style={{marginTop:8,padding:'5px 8px',background:'rgba(167,139,250,.08)',border:'1px solid rgba(167,139,250,.2)',borderRadius:8,textAlign:'center'}}>
        <span style={{fontSize:10,color:'var(--purple)',letterSpacing:'.1em',fontWeight:700}}>TAHMİNİNİZ: </span>
        <span style={{fontFamily:"'Bebas Neue'",fontSize:15,color:'var(--purple)',letterSpacing:'.08em'}}>{myP.h} - {myP.a}</span>
        {myP.pts!=null&&myP.pts!==0&&<span style={{marginLeft:6,fontFamily:"'Bebas Neue'",fontSize:14,color:myP.pts>0?'var(--green)':'var(--red)'}}>{myP.pts>0?'+':''}{myP.pts}</span>}
      </div>}
    </div>
    {!compact&&<div className="mc-bottom">
      {cd?<span className="mc-cd">⏱ {cd} kaldı</span>:<span className="mc-cd" style={{color:'var(--tm)',fontSize:10}}>{m.city}</span>}
    </div>}
  </div>;
}

/*  BENİM SAYFAM  */
function MyScreen({currentUser,onUserUpdate,scores}){
  const [now,setNow]=useState(new Date());
  const [tab,setTab]=useState('predict');
  const [preds,setPreds]=useState(()=>predictionsAdapter.getForUser(currentUser.username));
  const [champion,setChampion]=useState(()=>championAdapter.getForUser(currentUser.username));
  const [goldenBoot,setGoldenBoot]=useState(()=>goldenBootAdapter.getForUser(currentUser.username));
  const [productionStats,setProductionStats]=useState(null);
  const [avatarOpen,setAvatarOpen]=useState(false);
  const [avatarPreviewError,setAvatarPreviewError]=useState(false);
  const toast=useToast();
  const activeAvatar=useMemo(()=>avatarById(currentUser.avatarId),[currentUser.avatarId]);
  const hasAvatar=Boolean(currentUser.avatarId&&activeAvatar);
  const avatarFallback=(currentUser.displayName||currentUser.username||'U').charAt(0).toUpperCase();

  useEffect(()=>{const id=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(id)},[]);
  useEffect(()=>{setAvatarPreviewError(false)},[currentUser.avatarId]);
  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      try{
        const [loadedPreds,loadedChampion,loadedGoldenBoot]=await Promise.all([
          predictionsAdapter.loadForUser(currentUser.username),
          championAdapter.loadForUser(currentUser.username),
          goldenBootAdapter.loadForUser(currentUser.username)
        ]);
        if(cancelled) return;
        setPreds(loadedPreds||{});
        setChampion(loadedChampion||null);
        setGoldenBoot(loadedGoldenBoot||null);
      }catch(err){
        if(!cancelled&&isProductionMode()) toast(friendlySupabaseWriteError(err),'error');
      }
    })();
    return()=>{cancelled=true};
  },[currentUser.username]);
  useEffect(()=>{
    if(!isProductionMode()) return;
    let cancelled=false;
    (async()=>{
      try{
        const rows=await leaderboardAdapter.loadLeaderboard();
        const stats=rows.find(row=>normalizeUserLookupKey(row.username)===normalizeUserLookupKey(currentUser.username))||null;
        if(!cancelled) setProductionStats(stats);
      }catch(err){
        if(!cancelled) console.warn('Supabase current user stats load failed:',safeSupabaseError(err));
      }
    })();
    return()=>{cancelled=true};
  },[currentUser.username,scores]);
  const enriched=useMemo(()=>MATCHES.map(m=>({...m,status:getMatchStatus(m,now,scores),ls:getLockState(m,now),lockPct:getLockPct(m,now)})),[now,scores]);

  const savePred=async(matchId,h,a)=>{
    const m=MATCHES.find(x=>x.id===matchId);
    if(!m) return;
    if(getLockState(m,now)==='locked'||getLockState(m,now)==='started'){toast('Bu maç kilitlendi, tahmin yapılamaz!','error');return;}
    const nextPred={h:parseInt(h)||0,a:parseInt(a)||0,savedAt:new Date().toISOString(),pts:null};
    const res=await predictionsAdapter.saveMatch(currentUser.username,matchId,nextPred);
    if(!res.ok){toast(res.error||'Tahmin kaydedilemedi.','error');return;}
    let fresh=res.preds;
    try{fresh=await predictionsAdapter.loadForUser(currentUser.username)}catch(err){if(isProductionMode())console.warn('Prediction refresh failed:',safeSupabaseError(err))}
    setPreds(fresh||res.preds||{});
    processUserProfileScores(scoresAdapter.getScores(),USER_SCORE_TOURNAMENT_ID);
    onUserUpdate();
    toast(`Tahmin kaydedildi: ${h} - ${a} `,'success');
  };

  const saveChampion=async(team)=>{
    const res=await championAdapter.saveForUser(currentUser.username,team);
    if(!res.ok){toast(res.error||'Şampiyon tahmini güncellenemedi.','error');return;}
    let fresh=res.champion;
    try{fresh=await championAdapter.loadForUser(currentUser.username)}catch(err){if(isProductionMode())console.warn('Champion pick refresh failed:',safeSupabaseError(err))}
    setChampion(fresh||res.champion||team);
    toast(`Şampiyon tahmini güncellendi: ${fresh||res.champion||team} `,'success');
  };
  const saveGoldenBoot=async(playerName)=>{
    if(isTournamentPickLocked(now)){toast('Gol kralı tahmini kilitlendi, değişiklik yapılamaz!','error');return;}
    const pick=normalizeGoldenBootName(playerName);
    if(!pick){toast('Gol kralı tahmini boş olamaz.','error');return;}
    const res=await goldenBootAdapter.saveForUser(currentUser.username,pick);
    if(!res.ok){toast(res.error||'Gol kralı tahmini güncellenemedi.','error');return;}
    let fresh=res.goldenBoot;
    try{fresh=await goldenBootAdapter.loadForUser(currentUser.username)}catch(err){if(isProductionMode())console.warn('Golden Boot pick refresh failed:',safeSupabaseError(err))}
    setGoldenBoot(fresh||res.goldenBoot||pick);
    toast(`Gol kralı tahmini güncellendi: ${fresh||res.goldenBoot||pick} `,'success');
  };
  const saveAvatar=async(avatarId)=>{
    if(isProductionMode()){
      const res=await authAdapter.updateProfile({avatarId});
      if(!res.ok){toast(res.error||'Avatar güncellenemedi.','error');return;}
      await onUserUpdate();
      setAvatarOpen(false);
      toast('Avatar güncellendi.','success');
      return;
    }
    const users=usersAdapter.getAll();
    const me=users[currentUser.username];
    if(!me) return;
    me.avatarId=avatarId;
    users[currentUser.username]=me;
    usersAdapter.saveAll(users);
    onUserUpdate();
    setAvatarOpen(false);
    toast('Avatar güncellendi.','success');
  };

  const totalPreds=Object.keys(preds).length;
  const finishedWithScore=Object.entries(preds).filter(([mid,p])=>scores[mid]&&p.pts!=null);
  const totalPts=isProductionMode()?productionStats?.totalPoints||0:currentUser.totalPoints||0;
  const profileScore=isProductionMode()?calculateProfileScoreFromPredictions(preds,scores):Number(currentUser.userScore)||0;
  const correctPreds=isProductionMode()?productionStats?.tt||0:finishedWithScore.filter(([,p])=>p.pts>0).length;

  const openMatches=enriched.filter(m=>m.ls==='open'||m.ls==='warn');
  const lockedFinished=enriched.filter(m=>m.ls==='locked'||m.ls==='started'||m.status==='finished');
  const nextM=enriched.find(m=>m.status==='upcoming');
  const cd=nextM?cdText(nextM.utc,now):null;
  const predictRate=MATCHES.length?Math.round((totalPreds/MATCHES.length)*100):0;
  const successRate=finishedWithScore.length?Math.round((correctPreds/finishedWithScore.length)*100):0;

  return<div className="my-fm">
    <section className="my-banner">
      <div className="my-banner-left">
        <button type="button" className="my-badge my-avatar-btn" onClick={()=>setAvatarOpen(v=>!v)} title="Avatar seç">
          {hasAvatar&&!avatarPreviewError&&<img className="my-avatar-img" src={activeAvatar.src} alt={activeAvatar.label} onError={()=>setAvatarPreviewError(true)}/>}
          {hasAvatar&&avatarPreviewError&&<span className="my-avatar-fallback">{avatarFallback}</span>}
          {!hasAvatar&&<span className="my-avatar-upload">avatar yükle</span>}
        </button>
        <div>
          <div className="my-overline">USER DASHBOARD</div>
          <h2>BENİM SAYFAM</h2>
          <div className="my-meta">
            <span>@{currentUser.username}</span>
            <span>•</span>
            <span>{totalPreds} tahmin</span>
            <span>•</span>
            <span>{successRate}% isabet</span>
          </div>
        </div>
      </div>
      <div className="my-next-box">
        <div className="my-next-label">SONRAKİ MAÇ</div>
        {nextM?<>
          <div className="my-next-match">{nextM.h} vs {nextM.a}</div>
          <div className="my-next-time">{fmtDateFull(nextM.utc)} · {fmtTR(nextM.utc)} TR</div>
          <div className="my-next-cd">{cd||'Devam ediyor...'}</div>
        </>:<>
          <div className="my-next-match">Planlanmış maç yok</div>
          <div className="my-next-time">Takvim güncelleniyor</div>
        </>}
      </div>
    </section>

    {avatarOpen&&<section className="my-avatar-panel">
      <div className="panel-head">Avatar Seçimi</div>
      {AVATAR_CATEGORIES.map(cat=><div key={cat.id} className="my-avatar-group">
        <div className="my-avatar-group-title">{cat.label}</div>
        <div className="my-avatar-grid">
          {cat.items.map(a=>{
            const isActive=currentUser.avatarId===a.id;
            return<button key={a.id} type="button" className={`my-avatar-item${isActive?' active':''}`} onClick={()=>saveAvatar(a.id)} title={a.label}>
              <img src={a.src} alt={a.label}/>
              <span>{a.label}</span>
            </button>;
          })}
        </div>
      </div>)}
      <div className="my-avatar-note">Yalnızca sistemde tanımlı avatarlar seçilebilir.</div>
    </section>}

    <div className="my-stats-grid">
      <div className="my-stat"><span>PROFİL SKORU</span><strong>{profileScore}</strong><small>Tüm turnuvalar</small></div>
      <div className="my-stat"><span>TOPLAM PUAN</span><strong>{totalPts}</strong><small>Lig puanı</small></div>
      <div className="my-stat"><span>TAHMİN ORANI</span><strong>{predictRate}%</strong><small>{totalPreds}/{MATCHES.length}</small></div>
      <div className="my-stat"><span>İSABETLİ</span><strong>{correctPreds}</strong><small>Skorlanan maçlar</small></div>
    </div>

    <section className="my-workspace">
      <aside className="my-side">
        <ChampionCard champion={champion} onSave={saveChampion} now={now}/>
        <GoldenBootCard goldenBoot={goldenBoot} onSave={saveGoldenBoot} now={now}/>
        <div className="my-side-note">
          <div className="panel-head">SİSTEM NOTU</div>
          <p>Tahminler maçtan 60 dakika önce otomatik kilitlenir. Kilit sonrası değişiklik yapılamaz.</p>
        </div>
      </aside>

      <div className="my-main-panel">
        <div className="my-tabs">
          <button className={`my-tab${tab==='predict'?' active':''}`} onClick={()=>setTab('predict')}>
            Tahmin Yap <span>{openMatches.length}</span>
          </button>
          <button className={`my-tab${tab==='locked'?' active':''}`} onClick={()=>setTab('locked')}>
            Kilitli / Bitti <span>{lockedFinished.length}</span>
          </button>
          <button className={`my-tab${tab==='history'?' active':''}`} onClick={()=>setTab('history')}>
            Tahmin Geçmişi <span>{totalPreds}</span>
          </button>
        </div>

        <div className="my-tab-body">
          {tab==='predict'&&<div>
            {openMatches.length===0
              ?<div className="my-empty">
                <div className="my-empty-title">AÇIK TAHMİN YOK</div>
                <div className="my-empty-text">Tahmin penceresi açıldığında bu alandan skor tahmini yapabilirsiniz.</div>
              </div>
              :<PredMatchList matches={openMatches} preds={preds} scores={scores} now={now} onSave={savePred}/>
            }
          </div>}

          {tab==='locked'&&<div>
            {lockedFinished.length===0
              ?<div className="my-empty"><div className="my-empty-text">Henüz kilitlenmiş maç yok.</div></div>
              :<PredLockedList matches={lockedFinished} preds={preds} scores={scores} now={now}/>
            }
          </div>}

          {tab==='history'&&<PredHistory preds={preds} scores={scores}/>}
        </div>
      </div>
    </section>
  </div>;
}
/*  Champion Prediction Card  */
function ChampionCard({champion,onSave,now}){
  const [open,setOpen]=useState(false);
  const [search,setSearch]=useState('');
  const filtered=ALL_TEAMS.filter(t=>t.toLowerCase().includes(search.toLowerCase()));
  const lockAt=getTournamentPickLockAt();
  const isLocked=isTournamentPickLocked(now);
  const lockCountdown=cdText(lockAt.toISOString(),now);
  useEffect(()=>{if(isLocked&&open)setOpen(false)},[isLocked,open]);
  return<div className="champ-card">
    <div className="champ-title"> DÜNYA KUPASI ŞAMPİYON TAHMİNİ</div>
    <div className="champ-sub">
      {isLocked
        ?'Şampiyon tahmini kilitlendi (ilk maçtan 60 dk önce).'
        :`Kalan Süre: ${lockCountdown||'0dk'} (ilk maçtan 60 dk önce kilitlenir)`}
    </div>
    {champion?<>
      <div className="champ-selected">
        <span className="champ-sel-flag"><WFlag team={champion} size="lg"/></span>
        <div style={{flex:1}}>
          <div className="champ-sel-name">{champion}</div>
          <div className="champ-sel-sub">Şampiyon tahmininiz</div>
        </div>
        {!isLocked&&<button className="btn-sm-ghost" onClick={()=>setOpen(o=>!o)}>{open?'Kapat':'Değiştir'}</button>}
      </div>
      {open&&!isLocked&&<div style={{marginTop:12}}>
        <input className="champ-search" placeholder="Takım ara..." value={search} onChange={e=>setSearch(e.target.value)}/>
        <div className="champ-grid">{filtered.map(t=><button key={t} className={`champ-team-btn${t===champion?' selected':''}`} onClick={()=>{onSave(t);setOpen(false);setSearch('')}}><WFlag team={t} size="sm"/><span>{t}</span></button>)}</div>
      </div>}
    </>:<>
      {isLocked
        ?<div style={{fontSize:12,color:'var(--tm)',lineHeight:1.6}}>Tahmin süresi doldu. İlk maçtan 60 dakika önce şampiyon seçimi kapatıldı.</div>
        :<><input className="champ-search" placeholder="Takım ara veya seç..." value={search} onChange={e=>setSearch(e.target.value)}/>
          <div className="champ-grid">{filtered.slice(0,24).map(t=><button key={t} className="champ-team-btn" onClick={()=>{onSave(t);setSearch('')}}><WFlag team={t} size="sm"/><span>{t}</span></button>)}</div>
          {filtered.length>24&&<p style={{fontSize:11,color:'var(--tm)',marginTop:8}}>+{filtered.length-24} daha... aramaya devam edin</p>}
        </>}
    </>}
  </div>;
}

/*  Golden Boot Prediction Card  */
function GoldenBootCard({goldenBoot,onSave,now}){
  const [open,setOpen]=useState(false);
  const [search,setSearch]=useState('');
  const [customMode,setCustomMode]=useState(false);
  const [customName,setCustomName]=useState('');
  const lockAt=getTournamentPickLockAt();
  const isLocked=isTournamentPickLocked(now);
  const lockCountdown=cdText(lockAt.toISOString(),now);
  const isKnownPick=goldenBoot&&GOLDEN_BOOT_PLAYERS.some(p=>sameGoldenBootName(p,goldenBoot));
  const filtered=GOLDEN_BOOT_PLAYERS.filter(p=>p.toLocaleLowerCase('tr').includes(search.toLocaleLowerCase('tr')));
  useEffect(()=>{if(isLocked&&open)setOpen(false)},[isLocked,open]);
  useEffect(()=>{
    if(goldenBoot&&!GOLDEN_BOOT_PLAYERS.some(p=>sameGoldenBootName(p,goldenBoot))){
      setCustomMode(true);
      setCustomName(goldenBoot);
    }
  },[goldenBoot]);
  const pickPlayer=player=>{
    onSave(player);
    setOpen(false);
    setSearch('');
    setCustomMode(false);
  };
  const pickOther=()=>{
    setCustomMode(true);
    setOpen(false);
    if(!isKnownPick&&goldenBoot) setCustomName(goldenBoot);
  };
  const saveCustom=()=>{
    const pick=normalizeGoldenBootName(customName);
    if(pick) onSave(pick);
  };
  return<div className="champ-card golden-boot-card">
    <div className="champ-title">Dünya Kupası Gol Kralı Kim Olur?</div>
    <div className="champ-sub">
      {isLocked
        ?'Gol kralı tahmini kilitlendi (ilk maçtan 60 dk önce).'
        :`Kalan Süre: ${lockCountdown||'0dk'} (şampiyon tahminiyle aynı anda kilitlenir)`}
    </div>
    {goldenBoot&&<div className="champ-selected">
      <span className="golden-boot-mark">GB</span>
      <div style={{flex:1}}>
        <div className="champ-sel-name">{goldenBoot}</div>
        <div className="champ-sel-sub">Gol kralı tahmininiz</div>
      </div>
      {!isLocked&&<button className="btn-sm-ghost" onClick={()=>{setOpen(o=>!o);setCustomMode(false)}}>{open?'Kapat':'Değiştir'}</button>}
    </div>}

    {!isLocked&&(!goldenBoot||open)&&<>
      <input
        className="champ-search"
        placeholder="Oyuncu ara veya seç..."
        value={search}
        onFocus={()=>{setOpen(true);setCustomMode(false)}}
        onClick={()=>{setOpen(true);setCustomMode(false)}}
        onChange={e=>{setSearch(e.target.value);setOpen(true);setCustomMode(false)}}
      />
      {open&&<div className="champ-grid golden-boot-grid">
        <button type="button" className="champ-team-btn golden-boot-other" onClick={pickOther}><span>{GOLDEN_BOOT_OTHER_OPTION}</span></button>
        {filtered.map(p=><button key={p} type="button" className={`champ-team-btn${sameGoldenBootName(p,goldenBoot)?' selected':''}`} onClick={()=>pickPlayer(p)}><span>{p}</span></button>)}
      </div>}
      {filtered.length===0&&open&&<p style={{fontSize:11,color:'var(--tm)',marginTop:8}}>Listede eşleşme yok. Diğer seçeneğiyle oyuncu adı girebilirsiniz.</p>}
    </>}

    {!isLocked&&customMode&&<div className="golden-boot-custom">
      <input className="champ-search" placeholder="Oyuncu adını yaz..." value={customName} onChange={e=>setCustomName(e.target.value)} />
      <button type="button" className="btn-sm-ghost" onClick={saveCustom}>Kaydet</button>
    </div>}

    {isLocked&&!goldenBoot&&<div style={{fontSize:12,color:'var(--tm)',lineHeight:1.6}}>Tahmin süresi doldu. İlk maçtan 60 dakika önce gol kralı seçimi kapatıldı.</div>}
  </div>;
}

/*  Prediction Match List (Open)  */
function PredMatchList({matches,preds,scores,now,onSave}){
  const byDate=useMemo(()=>{const m={};matches.forEach(x=>{const k=fmtDateKey(x.utc);(m[k]=m[k]||[]).push(x)});return m},[matches]);
  return<div>{Object.entries(byDate).sort(([a],[b])=>a.localeCompare(b)).map(([dk,ms])=>(
    <div key={dk}>
      <div className="dt-sep">{fmtDateFull(ms[0].utc)}</div>
      {ms.map(m=><PredictionCard key={m.id} m={m} pred={preds[m.id]||null} score={scores[m.id]||null} now={now} onSave={onSave}/>)}
    </div>
  ))}</div>;
}

/*  Prediction Card (the star of the show)  */
function PredictionCard({m,pred,score,now,onSave}){
  const [hVal,setHVal]=useState(pred?String(pred.h):'');
  const [aVal,setAVal]=useState(pred?String(pred.a):'');
  const [dirty,setDirty]=useState(false);

  const ls=getLockState(m,now);
  const locked=ls==='locked'||ls==='started';
  const isLiveScoreboard=score&&score.status==='live';
  const isFinished=score!=null&&!isLiveScoreboard;

  // Auto-update inputs when pred changes from outside
  useEffect(()=>{if(pred&&!dirty){setHVal(String(pred.h));setAVal(String(pred.a))}},[]); // eslint-disable-line

  const stateClass=ls==='open'?'state-open':ls==='warn'?'state-warn':locked?'state-locked':'state-finished';
  const psbClass=ls==='open'?'psb-open':ls==='warn'?'psb-warn':'psb-locked';
  const lockPct=getLockPct(m,now);
  const hasStarted=now.getTime()>=new Date(m.utc).getTime();

  const cd=!locked?cdText(m.utc,now):null;
  const lockCd=ls==='warn'||ls==='open'?cdText(new Date(new Date(m.utc).getTime()-60*60000).toISOString(),now):null;

  const handleSave=()=>{
    if(hVal===''||aVal===''){return}
    onSave(m.id,parseInt(hVal)||0,parseInt(aVal)||0);
    setDirty(false);
  };

  const statusLabel=()=>{
    if(isFinished) return' MA TAMAMLANDI';
    if(locked) return pred?' KİLİTLENDİ  TAHMİNİNİZ KAYDEDİLDİ':' KİLİTLENDİ  TAHMİN GİRİLMEDİ';
    if(ls==='warn') return` KİLİTLENMEYE ${lockCd||'AZ'} KALDI`;
    return` TAHMİN AÇIK • Saat: ${fmtTR(m.utc)} TR`;
  };

  const hasSaved=pred!=null;

  return<div className={`pred-card ${stateClass}`}>
    {/* Status bar */}
    <div className={`pred-status-bar ${psbClass}`}>
      <span className="psb-txt">{isFinished?' TAMAMLANDI':locked?pred?' KİLİTLENDİ':'  TAHMİN GİRİLMEDİ':ls==='warn'?` KİLİTLENMEYE ${lockCd} KALDI`:` TAHMİN AÇIK`}</span>
      <span style={{fontSize:10,opacity:.75}}>{fmtTR(m.utc)} TR · GRP {m.grp}</span>
    </div>

    {/* Lock progress bar (only in warn state) */}
    {ls==='warn'&&<div className="lock-bar"><div className="lock-fill" style={{width:`${lockPct}%`,background:'var(--or)'}}/></div>}
    {ls==='open'&&<div className="lock-bar"><div className="lock-fill" style={{width:`${lockPct}%`,background:'var(--green)'}}/></div>}

    <div className="pred-body">
      {/* Shared scoreboard-style match header */}
      <div style={{marginBottom:12}}>
        <MatchScoreboard m={m} now={now} score={score} status={isFinished?'finished':isLiveScoreboard||hasStarted?'live':'upcoming'}/>
      </div>

      {/* Score input or locked display */}
      {!locked&&!isFinished&&!isLiveScoreboard&&<>
        <div className="pred-input-row">
          <input type="number" min="0" max="20" className={`score-box${hasSaved?' saved':''}`}
            value={hVal} onChange={e=>{setHVal(e.target.value);setDirty(true)}}
            onFocus={e=>e.target.select()}
            style={{fontSize:30}}/>
          <span className="score-colon">:</span>
          <input type="number" min="0" max="20" className={`score-box${hasSaved?' saved':''}`}
            value={aVal} onChange={e=>{setAVal(e.target.value);setDirty(true)}}
            onFocus={e=>e.target.select()}
            style={{fontSize:30}}/>
        </div>
        <div className="pred-footer">
          <div className="pred-meta">
            <div>{m.city}</div>
            {cd&&<div>⏱ {cd} kaldı</div>}
            {hasSaved&&!dirty&&<div style={{color:'var(--or)'}}> Kaydedildi</div>}
          </div>
          <button className="btn-sm" onClick={handleSave} disabled={hVal===''||aVal===''||(!dirty&&hasSaved)}>
            {hasSaved&&!dirty?'KAYDEDİLDİ ':'KAYDET'}
          </button>
        </div>
      </>}

      {/* Locked with prediction */}
      {locked&&pred&&<>
        <div style={{textAlign:'center',marginBottom:12}}>
          <div style={{fontSize:11,color:'var(--tm)',letterSpacing:'.12em',fontWeight:700,marginBottom:6}}>TAHMİNİNİZ</div>
          <div className="pred-saved-score">
            <span>{pred.h}</span><span className="pred-saved-sep">:</span><span>{pred.a}</span>
          </div>
        </div>
        {isFinished&&<>
          <div style={{textAlign:'center',marginBottom:12}}>
            <div style={{fontSize:11,color:'var(--tm)',letterSpacing:'.12em',fontWeight:700,marginBottom:6}}>GEREK SONU</div>
            <div className="pred-result"><span>{score.h}</span><span className="pred-result-sep">:</span><span>{score.a}</span></div>
          </div>
          {pred.pts!=null&&<div style={{textAlign:'center'}}>
            <div style={{fontSize:11,color:'var(--tm)',letterSpacing:'.12em',fontWeight:700,marginBottom:4}}>KAZANILAN PUAN</div>
            <div className={`pred-pts ${pred.pts>0?'pts-pos':pred.pts<0?'pts-neg':'pts-0'}`}>{pred.pts>0?'+':''}{pred.pts}</div>
          </div>}
        </>}
        {!isFinished&&<div style={{textAlign:'center',padding:'6px 0',fontSize:12,color:'var(--tm)'}}>Maç sonucu bekleniyor...</div>}
      </>}

      {/* Locked WITHOUT prediction */}
      {locked&&!pred&&<div style={{textAlign:'center',padding:'16px',background:'rgba(239,68,68,.04)',border:'1px solid rgba(239,68,68,.15)',borderRadius:10}}>
        <div style={{fontSize:26,marginBottom:6}}></div>
        <div style={{fontFamily:"'Bebas Neue'",fontSize:15,letterSpacing:'.1em',color:'var(--red)',marginBottom:4}}>TAHMİN GİRİLMEDİ</div>
        <div style={{fontSize:12,color:'var(--tm)'}}>Bu maç için tahmin girme süreniz doldu.</div>
      </div>}

      {/* Not locked, no prediction yet, show hint */}
      {!locked&&!pred&&<div style={{textAlign:'center',fontSize:11,color:'var(--tm)',marginBottom:4}}>Skoru gir ve kaydet</div>}
    </div>
  </div>;
}

/*  Locked/Finished List  */
function PredLockedList({matches,preds,scores,now}){
  const byDate=useMemo(()=>{const m={};matches.forEach(x=>{const k=fmtDateKey(x.utc);(m[k]=m[k]||[]).push(x)});return m},[matches]);
  return<div>{Object.entries(byDate).sort(([a],[b])=>b.localeCompare(a)).map(([dk,ms])=>(
    <div key={dk}>
      <div className="dt-sep">{fmtDateFull(ms[0].utc)}</div>
      {ms.map(m=><PredictionCard key={m.id} m={m} pred={preds[m.id]||null} score={scores[m.id]||null} now={now} onSave={()=>{}}/>)}
    </div>
  ))}</div>;
}

/*  Prediction History  */
function PredHistory({preds,scores}){
  const rows=MATCHES.map(m=>({m,pred:preds[m.id]||null,score:scores[m.id]||null})).filter(r=>r.pred||r.score);
  if(rows.length===0) return<div style={{padding:'24px',textAlign:'center',color:'var(--ts)',fontSize:14}}>Henüz tahmin girilmemiş. "Tahmin Yap" sekmesinden başlayın!</div>;
  const totalPts=rows.reduce((s,r)=>s+(r.pred?.pts||0),0);
  return<div>
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
      <div style={{fontFamily:"'Bebas Neue'",fontSize:16,letterSpacing:'.12em',color:'var(--ts)'}}>TOPLAM: {rows.length} TAHMİN</div>
      <div style={{marginLeft:'auto',fontFamily:"'Bebas Neue'",fontSize:22,color:totalPts>0?'var(--green)':totalPts<0?'var(--red)':'var(--tm)'}}>{totalPts>0?'+':''}{totalPts} PUAN</div>
    </div>
    <div className="scroll" style={{maxHeight:520}}>
      {rows.map(({m,pred,score})=>(
        <div key={m.id} className="hist-row">
          <div className="hist-match">
            <div className="hist-teams" style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}><WFlag team={m.h} size="sm"/><span>{m.h}</span><span>vs</span><WFlag team={m.a} size="sm"/><span>{m.a}</span></div>
            <div className="hist-date">{fmtDateFull(m.utc)} · {fmtTR(m.utc)} TR · Grup {m.grp}</div>
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--tm)',marginBottom:2}}>TAHMİN</div>
            {pred?<div className="hist-pred">{pred.h} - {pred.a}</div>:<div style={{fontSize:11,color:'var(--red)'}}></div>}
          </div>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:10,color:'var(--tm)',marginBottom:2}}>SONU</div>
            {score?<div className="hist-result">{score.h} - {score.a}</div>:<div style={{fontSize:11,color:'var(--tm)'}}>?</div>}
          </div>
          <div className="hist-pts">
            {pred?.pts!=null?<span style={{color:pred.pts>0?'var(--green)':pred.pts<0?'var(--red)':'var(--tm)',fontFamily:"'Bebas Neue'",fontSize:20}}>{pred.pts>0?'+':''}{pred.pts}</span>:<span style={{color:'var(--tm)',fontSize:14}}></span>}
          </div>
        </div>
      ))}
    </div>
  </div>;
}

/*  RULES  */

  const rules=[
    {icon:'⚑',t:'Seri Başı Galibiyeti',d:'Seri başı takımın maçını doğru tahmin et',pts:'+1',c:'pts-g'},
    {icon:'═',t:'Beraberlik',d:'Maç beraberlikle biterse',pts:'+2',c:'pts-g'},
    {icon:'⇄',t:'Diğer Takım Galibiyeti',d:'İki "diğer" takım arasındaki galibiyeti tahmin et',pts:'+1',c:'pts-g'},
    {icon:'▲',t:'Sürpriz Galibiyet',d:'Seri başı olmayan takım seri başına galip gelirse',pts:'+3',c:'pts-g'},
    {icon:'★',t:'Şampiyon Tahmini',d:'Turnuvayı kazanan takımı doğru tahmin et',pts:'+5',c:'pts-gold'},
    {icon:'⚽',t:'Gol Kralı Tahmini',d:'Turnuva başlamadan önce seçilir. Doğru tahmin',pts:'+3',c:'pts-gold'}

    ['1-0 / 0-1','2 Puan'],

    ['2-1 / 1-2','3 Puan'],
    ['3-0 / 0-3','3 Puan'],

  return<div className="rules-fm">
    <section className="rules-banner">
      <div className="rules-banner-left">
        <div className="rules-badge">RL</div>
        <div>
          <div className="rules-overline">COMPETITION PROTOCOL · SCORING SYSTEM</div>
          <h2>KURALLAR</h2>
          <div className="rules-sub">
            <span>Puanlama sistemi</span>
            <span>•</span>
            <span>Tahmin kilidi</span>
            <span>•</span>
            <span>Veri politikası</span>
          </div>
        </div>
      </div>
      <div className="rules-banner-right">
        <small>ANA KURAL</small>
        <strong>Tahminler maçtan 60 dakika önce kapanır</strong>
        <span>Kilit sonrası düzenleme yapılamaz</span>

    <section className="rules-grid" data-rules-grid>
      <div className="rules-stack">
        <div className="rules-card rules-note-orange">
          <div className="panel-head">NASIL OYNANIR?</div>
          <p className="rules-lead">
            Kayıt olduktan sonra "Benim Sayfam" bölümünden her maç için skor tahmini yapabilirsin.
            Tahminler maç başlamadan <strong style={{color:'var(--or)'}}>60 dakika öncesine</strong> kadar açıktır.
            Süre dolduğunda tahminler kilitlenir ve yalnızca görüntülenebilir.
          </p>

        <div className="rules-card">
          <div className="panel-head">PUAN KURALLARI</div>
          <div style={{marginTop:8}}>
            {rules.map((r,i)=><div key={i} className="rule-card">
              <span style={{fontSize:14,flexShrink:0,marginTop:2,color:'var(--or)'}}>{r.icon}</span>
              <div style={{flex:1}}>
                <div className="rule-title">{r.t}</div>
                <div className="rule-desc">{r.d}</div>

              <div className={`rule-pts ${r.c}`}>{r.pts}</div>

      <div className="rules-stack">

/*  ROOT  */
function App(){
  const [user,setUser]=useState(undefined);
  const [bootMsg,setBootMsg]=useState(null);
  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      if(isProductionMode()&&!hasSupabaseConfig()){
        if(!cancelled){setBootMsg({text:SUPABASE_CONFIG_MISSING_MESSAGE,type:'error'});setUser(null);}
        return;
      }
      try{
        if(isDemoMode()) ensureMertAdmin();
        const current=await authAdapter.getCurrentUser();
        if(!cancelled) setUser(current);
      }catch(err){
        if(!cancelled){setBootMsg({text:safeSupabaseError(err),type:'error'});setUser(null);}
      }
    })();
    return()=>{cancelled=true};
  },[]);
  if(isProductionMode()&&!hasSupabaseConfig()) return<ProductionModeNotice/>;
  if(user===undefined)return<div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg0)',flexDirection:'column',gap:16}}><div style={{fontSize:48,animation:'spin 1.2s linear infinite'}}></div><style>{'@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}'}</style><div style={{fontFamily:"'Bebas Neue'",fontSize:16,letterSpacing:'.2em',color:'var(--tm)'}}>YÜKLENİYOR...</div></div>;
  if(!user)return<AuthScreen onLogin={setUser} initialMsg={bootMsg}/>;
  return<ToastProvider><MainApp currentUser={user} onLogout={()=>setUser(null)}/></ToastProvider>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
